name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install dependencies from MELPA
        run: |
          emacs -Q --batch --eval "
          (progn
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (package-refresh-contents)
            (package-install 'emacsql))"

      - name: Run tests
        run: |
          EMACSQL_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "emacsql-[0-9]*" -type d | head -1)
          COMPAT_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "compat-*" -type d | head -1)

          LOAD_ARGS="-L . -L test"
          [ -d "$EMACSQL_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $EMACSQL_DIR"
          [ -d "$COMPAT_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $COMPAT_DIR"

          FAILED=0
          for f in test/*-test.el; do
            echo "=== Running $(basename $f) ==="
            if ! emacs -Q --batch $LOAD_ARGS \
                 -l ert \
                 -l test/test-stubs.el \
                 -l "$f" \
                 -f ert-run-tests-batch-and-exit; then
              FAILED=1
            fi
            echo ""
          done
          exit $FAILED
