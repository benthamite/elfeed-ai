name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install dependencies from MELPA
        run: |
          emacs -Q --batch --eval "
          (progn
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (package-refresh-contents)
            ;; cond-let is built into Emacs 30+; older versions need the
            ;; GNU ELPA shim so that the latest transient can load.
            (unless (locate-library \"cond-let\")
              (package-install 'cond-let))
            (package-install 'elfeed)
            (package-install 'gptel))"

      - name: Run tests
        run: |
          ELFEED_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "elfeed-[0-9]*" -type d | head -1)
          GPTEL_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "gptel-*" -type d | head -1)
          COMPAT_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "compat-*" -type d | head -1)
          TRANSIENT_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "transient-*" -type d | head -1)
          MAP_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "map-*" -type d | head -1)
          CONDLET_DIR=$(find ~/.emacs.d/elpa -maxdepth 1 -name "cond-let-*" -type d | head -1)

          LOAD_ARGS="-L . -L test"
          [ -d "$ELFEED_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $ELFEED_DIR"
          [ -d "$GPTEL_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $GPTEL_DIR"
          [ -d "$COMPAT_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $COMPAT_DIR"
          [ -d "$TRANSIENT_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $TRANSIENT_DIR"
          [ -d "$MAP_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $MAP_DIR"
          [ -d "$CONDLET_DIR" ] && LOAD_ARGS="$LOAD_ARGS -L $CONDLET_DIR"

          for f in test/*-test.el; do
            echo "=== Running $(basename $f) ==="
            emacs -Q --batch $LOAD_ARGS \
                 -l ert \
                 -l "$f" \
                 -f ert-run-tests-batch-and-exit
            echo ""
          done
